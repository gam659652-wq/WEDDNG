<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعوة زفاف محمد & سعاد</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div id="envelope" class="envelope">

        <div class="envelope-back"></div>

        <div class="letter">

            <div class="card">

                <span class="gold-line"></span>

                <h3>دعوة زفاف</h3>

                <h1>محمد</h1>

                <div class="heart">🤍</div>

                <h1>سعاد</h1>

                <p class="text">
                    يسرنا دعوتكم لتشريفنا
                    وحضور حفل زفافنا
                </p>

                <div class="details">

                    <div class="item">
                        <span>📅</span>
                        <p>22 / 7 / 2027</p>
                    </div>

                    <div class="item">
                        <span>🕘</span>
                        <p>9:00 مساءً</p>
                    </div>

                    <div class="item">
                        <span>📍</span>
                        <p>أمام منزل والد العريس</p>
                    </div>

                </div>

                <p class="footer">
                    يشرفنا حضوركم ومشاركتنا
                    أجمل لحظات عمرنا
                </p>

            </div>

        </div>

        <div class="flap"></div>

    </div>

    <button id="openBtn">
        افتح الدعوة ✨
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
